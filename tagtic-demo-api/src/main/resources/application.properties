spring.application.name=tagtic

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:tagticdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# H2 Console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Multipart file upload limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# OpenAPI / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# CORS — origines autorisées (séparées par une virgule si plusieurs)
cors.allowed-origin-patterns=http://localhost,http://localhost:80,http://localhost:4200

# AWS S3 — configure real credentials to enable image uploads
aws.s3.bucket-name=tagtic-demo-152247505439-eu-west-3-an
aws.s3.region=eu-west-3