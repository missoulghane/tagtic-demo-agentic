name: CI/CD Tagtic

on:
  push:
    branches:
      - main # ⚠️ Ajuste par 'master' si nécessaire

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Connexion au dépôt
        uses: actions/checkout@v4

      - name: Connexion à GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Mettre le nom d'utilisateur en minuscules
      - name: Passer le nom d'utilisateur en minuscules
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./tagtic-demo-api
          file: ./tagtic-demo-api/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/tagtic-api:latest # 👈 Utilise la variable en minuscules

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./tagtic-demo-web
          file: ./tagtic-demo-web/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/tagtic-web:latest # 👈 Utilise la variable en minuscules

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Déploiement SSH sur l'EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/tagtic-demo-agentic
            git pull
            
            # Utilisation du nom en minuscules pour le login sur l'EC2 également
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            docker compose pull
            docker compose up -d --remove-orphans