name: CI/CD Tagtic

on:
  push:
    branches:
      - main 
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Connexion au dépôt
        uses: actions/checkout@v4

      - name: Connexion à GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./tagtic-demo-api
          file: ./tagtic-demo-api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/tagtic-api:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./tagtic-demo-web
          file: ./tagtic-demo-web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/tagtic-web:latest