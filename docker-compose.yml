services:
  backend:
    # On pointe vers le registre GitHub
    image: ghcr.io/votre-nom-github/tagtic-api:latest
    container_name: tagtic-api
    ports:
      - "8080:8080"
    restart: always
    env_file:
      - ./tagtic-demo-api/.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod

  frontend:
    # Idem pour le frontend
    image: ghcr.io/votre-nom-github/tagtic-web:latest
    container_name: tagtic-web
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend